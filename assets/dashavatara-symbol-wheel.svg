    <path d="M1046 354c-36-39-78-49-127-27 32 45 75 53 127 27Z"/>
    <path d="M1048 549c-51-22-94-12-128 30 49 22 91 12 128-30Z"/>
    <path d="M872 710c-53-10-91-41-112-93 57-4 96 27 112 93Z"/>
