  <text x="700" y="475" text-anchor="middle" font-size="22" font-family="Georgia, serif" fill="#f7ead2">Dharma restored in many forms</text>
  <g fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M342 454c42-39 95-39 138 0-43 39-96 39-138 0Z"/>
    <path d="M429 230c48 0 82 22 105 66-59 13-102-5-128-51"/>
