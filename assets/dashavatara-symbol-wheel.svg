<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Dashavatara Symbol Wheel</title>
  <desc id="desc">A premium manuscript-style symbolic wheel for the ten avatars of Vishnu.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0" stop-color="#f4dfb9"/>
      <stop offset="0.58" stop-color="#4d2010"/>
      <stop offset="1" stop-color="#120800"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#a66a1e"/>
      <stop offset="0.5" stop-color="#f3cf73"/>
      <stop offset="1" stop-color="#8a4d12"/>
    </linearGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="1400" height="900" fill="url(#bg)"/>
  <g opacity=".22" stroke="#f3cf73" fill="none">
    <circle cx="700" cy="450" r="350"/>
    <circle cx="700" cy="450" r="270"/>
    <circle cx="700" cy="450" r="188"/>
